# SimNPO: reference-free NPO with a margin + NLL retain (full model).
# Paper-aligned defaults (Fan 2024 / open-unlearning): beta=4.5, margin=0,
# forget weight gamma=0.125, retain alpha=1. `forget.gamma` is the SimNPO margin.
forget:
  _target_: src.component.forget.sim_npo.SimNpoForget
  beta: 4.5
  gamma: 0.0
retain:
  _target_: src.component.retain.ce.CERetain
weighting:
  _target_: src.component.weighting.one_over_t.OneOverT
adapter:
  _target_: src.component.adapter.full_model.FullModel
mask:
  _target_: src.component.mask.bernoulli.BernoulliMask

args:
  steps: 500
  warmup_steps: 150
  lr: 2e-5
  gamma_forget: 0.125
  alpha_retain: 1.0
  batch_forget: 2
  batch_retain: 2
  seq_len: 512
  grad_clip: 1.0
  t_min: 0.1
  t_max: 0.9
  seed: 42
  mask_id: ${model.mask_id}
  use_8bit_optim: true
  scheduler: cosine

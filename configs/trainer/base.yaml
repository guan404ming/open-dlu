# Shared training defaults. Trainers inherit via `defaults: [base]` and override
# only what differs; experiments override dataset-level args (e.g. steps).
args:
  steps: 500
  warmup_steps: 150
  lr: 5e-5
  scheduler: cosine          # cosine / constant_with_warmup / linear
  grad_accum: 1
  gamma_forget: 1.0
  alpha_retain: 1.0
  batch_forget: 2
  batch_retain: 2
  seq_len: 512
  grad_clip: 1.0
  t_min: 0.1
  t_max: 0.9
  seed: 42
  mask_id: ${model.mask_id}
  use_8bit_optim: false

# Recall cap (ours): layer-restricted + Min-SNR + constant LR after warmup.
defaults:
  - base
forget:
  _target_: src.component.forget.capped.CappedForget
  cap: 1.0
retain:
  _target_: src.component.retain.ce.CERetain
weighting:
  _target_: src.component.weighting.min_snr.MinSnr
  gamma: 2.0
adapter:
  _target_: src.component.adapter.layer_restricted.LayerRestricted
  layers: [5, 6, 7]
mask:
  _target_: src.component.mask.bernoulli.BernoulliMask
args:
  scheduler: constant_with_warmup
  # Tuned on wmdp_bio (domain retain): cap=1.0 is the saturation sweet spot
  # (raising it forgets less), and steps=800 is the depth knee
  # (bio 0.318 / mmlu 0.624; beyond ~800 the retain term recovers MCQ).
  steps: 800

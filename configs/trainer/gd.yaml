# Gradient Difference (full-model GA + CE retain). Also the base for the other
# full-model baselines: NPO / SimNPO / WGA inherit it and just swap the forget loss.
defaults:
  - base
forget:
  _target_: src.component.forget.grad_ascent.GradAscent
retain:
  _target_: src.component.retain.ce.CERetain
weighting:
  _target_: src.component.weighting.one_over_t.OneOverT
adapter:
  _target_: src.component.adapter.full_model.FullModel
mask:
  _target_: src.component.mask.bernoulli.BernoulliMask
args:
  lr: 2e-5  # dlm-mu full-model baseline LR (cap uses base 5e-5; 5e-5 here over-forgets)
  use_8bit_optim: false  # full-model GA+CE on B200 (192GB); no bitsandbytes needed

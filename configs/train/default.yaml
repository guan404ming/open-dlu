# Training hyperparameters (-> src.config.TrainConfig). Group: train.
steps: 500
warmup_steps: 150
lr: 5e-5
alpha_retain: 1.0
batch_forget: 2
batch_retain: 2
seq_len: 512
grad_clip: 1.0
t_min: 0.1
t_max: 0.9
seed: 42
mask_id: ${model.mask_id}    # model-driven, no hardcoding
use_8bit_optim: false
cosine_decay: false
